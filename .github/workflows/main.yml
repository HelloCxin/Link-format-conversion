name: "Sing-box Rules Factory 2026"

on:
  schedule:
    - cron: '0 0 * * *' # 每天凌晨 0 点自动开工
  workflow_dispatch: # 支持你随时点击按钮手动开工

# 核心：赋予脚本写入权限，强制使用 Node 24 环境
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_rules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Get Latest sing-box & Install
        run: |
          # 动态获取官方最新 Release 版本号，不敷衍，永远最新
          TAG=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r .tag_name | sed 's/v//')
          echo "Installing sing-box version: $TAG"
          curl -Lo sing-box.tar.gz "https://github.com/SagerNet/sing-box/releases/download/v{TAG}/sing-box-${TAG}-linux-amd64.tar.gz"
          tar -xzf sing-box.tar.gz
          mv sing-box-*/sing-box .
          chmod +x sing-box

      - name: Process TXT and Convert to SRS
        run: |
          # 1. 下载你的原始 TXT 规则 (GOODBYEADS)
          curl -Lo original.txt "https://raw.githubusercontent.com/8680/GOODBYEADS/master/data/rules/ad-domain.txt"
          
          # 2. 清洗数据：去掉注释、空行、空格
          sed -i 's/[[:space:]]//g' original.txt
          grep -v '^#' original.txt | grep -v '^$' > clean.txt
          
          # 3. 智能分流解析：
          # 把 *.abc.com 提取出来变成 abc.com 放入 domain_suffix
          grep '^\*' clean.txt | sed 's/^\*\.//g' | sed 's/^\*//g' > suffixes.txt
          # 把剩下的普通域名放入 domain
          grep -v '^\*' clean.txt > domains.txt

          # 4. 构建符合 2026 最新标准的 sing-box JSON
          echo '{"version": 1, "rules": [{"domain": [' > rules.json
          sed 's/.*/"&",/' domains.txt | sed '$ s/,$//' >> rules.json
          echo '], "domain_suffix": [' >> rules.json
          sed 's/.*/"&",/' suffixes.txt | sed '$ s/,$//' >> rules.json
          echo ']}]}' >> rules.json
          
          # 5. 编译成二进制 SRS
          ./sing-box rule-set compile rules.json -o goodbyeads.srs
          echo "Compilation successful: goodbyeads.srs generated."

      - name: Auto Push to GitHub
        run: |
          git config --local user.email "bot@github.com"
          git config --local user.name "Rules-Bot-2026"
          git add goodbyeads.srs
          # 只有在文件有变化时才提交，避免无效记录
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update rules: $(date +'%Y-%m-%d %H:%M')" && git push)
