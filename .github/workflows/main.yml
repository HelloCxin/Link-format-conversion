name: "Sing-box Rules Factory 2026 PRO"

on:
  workflow_dispatch: # 支持手动点击运行
  schedule:
    - cron: '0 2 * * *' # 每天凌晨 2 点自动更新

# 强制开启 Node 24 运行环境，消除所有黄色警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

permissions:
  contents: write # 核心权限：允许脚本往你的仓库写文件

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "1. 检出仓库"
        uses: actions/checkout@v4

      - name: "2. 环境初始化 (安装最新 sing-box)"
        run: |
          # 自动获取最新稳定版，确保编译器也是最新的
          LATEST_TAG=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r .tag_name | sed 's/v//')
          echo "正在安装 sing-box v$LATEST_TAG"
          curl -Lo sing-box.tar.gz "https://github.com/SagerNet/sing-box/releases/download/v${LATEST_TAG}/sing-box-${LATEST_TAG}-linux-amd64.tar.gz"
          tar -xzf sing-box.tar.gz
          mv sing-box-*/sing-box .
          chmod +x sing-box

      - name: "3. 规则深度解析 (针对 ad-domain.txt)"
        run: |
          # 下载你提供的最新拦截链接
          curl -Lo original.txt "https://raw.githubusercontent.com/8680/GOODBYEADS/master/data/rules/ad-domain.txt"
          
          # 使用 Python 处理几万行数据，比 sed 快且稳
          python3 <<EOF
          import json
          domains = set()
          suffixes = set()
          with open('original.txt', 'r', encoding='utf-8') as f:
              for line in f:
                  line = line.strip()
                  # 过滤注释、空行和非法行
                  if not line or line.startswith('#') or line.startswith('!'):
                      continue
                  # 处理 *.example.com 格式
                  if line.startswith('*.'):
                      suffixes.add(line[2:])
                  elif line.startswith('.'):
                      suffixes.add(line[1:])
                  elif line.startswith('*'):
                      suffixes.add(line[1:])
                  else:
                      domains.add(line)
          
          # 转换为 sing-box 标准 JSON 格式
          data = {
              "version": 1,
              "rules": [{
                  "domain": sorted(list(domains)),
                  "domain_suffix": sorted(list(suffixes))
              }]
          }
          with open('rules.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, separators=(',', ':'))
          EOF
          echo "规则转换成功，共处理了 $(wc -l < original.txt) 行原始规则"

      - name: "4. 编译 SRS 二进制文件"
        run: |
          ./sing-box rule-set compile rules.json -o goodbyeads.srs
          echo "SRS 编译完成！文件大小: $(du -h goodbyeads.srs | cut -f1)"

      - name: "5. 将文件同步至仓库"
        run: |
          git config --local user.email "github-actions[bot]@github.com"
          git config --local user.name "github-actions[bot]"
          git add goodbyeads.srs
          # 只有在规则文件真的发生变化时才提交，防止空推送报错
          if git diff --staged --quiet; then
            echo "规则无变化，无需提交"
          else
            git commit -m "Auto Update SRS: $(date +'%Y-%m-%d %H:%M')"
            git push origin main || git push origin master
          fi
