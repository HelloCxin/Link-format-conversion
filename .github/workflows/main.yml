name: "Sing-box Rules Factory PRO"

on:
  schedule:
    - cron: '0 2 * * *' # 每天凌晨2点自动更新
  workflow_dispatch: # 支持你手动点 Run workflow

# 强制全局环境，解决你看到的 Node.js 24 警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build_srs:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须给写入权限，否则 push 会报错
    
    steps:
      - name: "1. 检出仓库代码"
        uses: actions/checkout@v4

      - name: "2. 环境初始化 (安装最新 sing-box)"
        run: |
          # 动态获取官方最新版本号，不写死，永远用最新的编译器
          LATEST_VERSION=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r .tag_name | sed 's/v//')
          echo "检测到最新版本: $LATEST_VERSION"
          curl -Lo sing-box.tar.gz "https://github.com/SagerNet/sing-box/releases/download/v{LATEST_VERSION}/sing-box-${LATEST_VERSION}-linux-amd64.tar.gz"
          tar -xzf sing-box.tar.gz
          mv sing-box-*/sing-box .
          chmod +x sing-box

      - name: "3. 规则清洗与 JSON 转换"
        run: |
          # 下载你指定的 GOODBYEADS 原始文件
          curl -Lo original.txt "https://raw.githubusercontent.com/8680/GOODBYEADS/master/data/rules/ad-domain.txt.txt"
          
          # 核心逻辑：利用 Python 处理 JSON，比 sed 稳一万倍，绝不会因为特殊字符报错
          python3 <<EOF
          import json
          domains = []
          suffixes = []
          with open('original.txt', 'r') as f:
              for line in f:
                  line = line.strip()
                  if not line or line.startswith('#'):
                      continue
                  if line.startswith('*.'):
                      suffixes.append(line[2:])
                  elif line.startswith('*'):
                      suffixes.append(line[1:])
                  else:
                      domains.append(line)
          
          data = {
              "version": 1,
              "rules": [{
                  "domain": domains,
                  "domain_suffix": suffixes
              }]
          }
          with open('rules.json', 'w') as f:
              json.dump(data, f, indent=2)
          EOF
          echo "JSON 转换成功！"

      - name: "4. 编译为二进制 SRS"
        run: |
          ./sing-box rule-set compile rules.json -o goodbyeads.srs
          if [ -f "goodbyeads.srs" ]; then
            echo "SRS 编译完成！文件大小: $(du -h goodbyeads.srs | cut -f1)"
          else
            echo "SRS 编译失败！" && exit 1
          fi

      - name: "5. 自动提交并推送"
        run: |
          git config --local user.email "github-actions[bot]@github.com"
          git config --local user.name "github-actions[bot]"
          git add goodbyeads.srs
          # 只有在文件内容真的变了才提交，防止空提交报错
          if git diff --staged --quiet; then
            echo "规则没有变化，跳过提交"
          else
            git commit -m "自动更新: $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
