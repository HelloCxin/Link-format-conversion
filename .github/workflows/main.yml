name: Update Rule Set
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# 解决 Node.js 20 警告的关键配置
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sing-box
        run: |
          # 自动获取最新版 sing-box (目前 v1.8.10 是较新稳定版)
          curl -Lo sing-box.tar.gz https://github.com/SagerNet/sing-box/releases/download/v1.8.10/sing-box-1.8.10-linux-amd64.tar.gz
          tar -xzf sing-box.tar.gz
          mv sing-box-*/sing-box .

      - name: Convert TXT to SRS
        run: |
          # 1. 下载原始规则
          curl -Lo rules.txt "https://raw.githubusercontent.com/8680/GOODBYEADS/master/data/rules/ad-domain.txt"
          
          # 2. 格式化处理：剔除注释、空行，处理通配符
          grep -v '^#' rules.txt | grep -v '^[[:space:]]*$' > clean.txt
          grep '^\*' clean.txt | sed 's/^\*\.//g' | sed 's/^\*//g' > suffixes.txt
          grep -v '^\*' clean.txt > domains.txt

          # 3. 生成符合 sing-box 规范的 JSON
          echo '{"version": 1, "rules": [' > rules.json
          echo '  {"domain": [' >> rules.json
          sed 's/.*/"&",/' domains.txt | sed '$ s/,$//' >> rules.json
          echo '  ], "domain_suffix": [' >> rules.json
          sed 's/.*/"&",/' suffixes.txt | sed '$ s/,$//' >> rules.json
          echo '  ]}' >> rules.json
          echo ']}' >> rules.json
          
          # 4. 编译成二进制 srs 格式
          ./sing-box rule-set compile rules.json -o goodbyeads.srs

      - name: Push to Repository
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add goodbyeads.srs
          git commit -m "Update GoodbyeAds rules with Node24" || exit 0
          git push
